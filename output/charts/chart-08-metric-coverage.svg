<?xml version="1.0" encoding="UTF-8"?>
<svg width="620" height="290" viewBox="0 0 620 290" xmlns="http://www.w3.org/2000/svg">
  <rect width="620" height="290" fill="#0f172a"/>
  <!-- Plot area: x=80 to 580, y=20 to 220 -->
  <!-- 6 groups: Acquisition, Conversion, Discovery, Retention, Brand/OOH, Supply Quality -->
  <!-- Group positions (centers): 100, 200, 300, 380, 460, 550 -->
  <!-- Bar width: 12px each tool, 2px gap -->
  <!-- Y scale: 0-5, plot height=200, each unit=40px -->
  <!-- y = 220 - count*40 -->

  <!-- Y axis -->
  <line x1="75" y1="20" x2="75" y2="225" stroke="#334155" stroke-width="1"/>
  <text x="70" y="225" fill="#64748b" font-size="9" font-family="sans-serif" text-anchor="end">0</text>
  <text x="70" y="185" fill="#64748b" font-size="9" font-family="sans-serif" text-anchor="end">1</text>
  <text x="70" y="145" fill="#64748b" font-size="9" font-family="sans-serif" text-anchor="end">2</text>
  <text x="70" y="105" fill="#64748b" font-size="9" font-family="sans-serif" text-anchor="end">3</text>
  <text x="70" y="65" fill="#64748b" font-size="9" font-family="sans-serif" text-anchor="end">4</text>
  <text x="70" y="25" fill="#64748b" font-size="9" font-family="sans-serif" text-anchor="end">5</text>
  <line x1="75" y1="225" x2="590" y2="225" stroke="#334155" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="75" y1="185" x2="590" y2="185" stroke="#1e293b" stroke-width="1"/>
  <line x1="75" y1="145" x2="590" y2="145" stroke="#1e293b" stroke-width="1"/>
  <line x1="75" y1="105" x2="590" y2="105" stroke="#1e293b" stroke-width="1"/>
  <line x1="75" y1="65" x2="590" y2="65" stroke="#1e293b" stroke-width="1"/>

  <!-- Colors: OpenPanel=#2563eb, GA4=#f97316, SearchConsole=#16a34a, PayGateway=#0891b2, InternalDB=#64748b -->

  <!-- Group 1: Acquisition (center ~100) OpenPanel=1, GA4=1 -->
  <rect x="82" y="185" width="12" height="40" fill="#2563eb" rx="2"/>
  <rect x="96" y="185" width="12" height="40" fill="#f97316" rx="2"/>
  <text x="96" y="242" fill="#94a3b8" font-size="9" font-family="sans-serif" text-anchor="middle">Acquisition</text>

  <!-- Group 2: Conversion (center ~200) OpenPanel=3, GA4=2, PayGateway=1 -->
  <rect x="180" y="105" width="12" height="120" fill="#2563eb" rx="2"/>
  <rect x="194" y="145" width="12" height="80" fill="#f97316" rx="2"/>
  <rect x="208" y="185" width="12" height="40" fill="#0891b2" rx="2"/>
  <text x="198" y="242" fill="#94a3b8" font-size="9" font-family="sans-serif" text-anchor="middle">Conversion</text>

  <!-- Group 3: Discovery OpenPanel=2, GA4=1 -->
  <rect x="286" y="145" width="12" height="80" fill="#2563eb" rx="2"/>
  <rect x="300" y="185" width="12" height="40" fill="#f97316" rx="2"/>
  <text x="296" y="242" fill="#94a3b8" font-size="9" font-family="sans-serif" text-anchor="middle">Discovery</text>

  <!-- Group 4: Retention OpenPanel=1 -->
  <rect x="382" y="185" width="12" height="40" fill="#2563eb" rx="2"/>
  <text x="388" y="242" fill="#94a3b8" font-size="9" font-family="sans-serif" text-anchor="middle">Retention</text>

  <!-- Group 5: Brand/OOH GA4=1, SearchConsole=1 -->
  <rect x="468" y="185" width="12" height="40" fill="#f97316" rx="2"/>
  <rect x="482" y="185" width="12" height="40" fill="#16a34a" rx="2"/>
  <text x="478" y="242" fill="#94a3b8" font-size="9" font-family="sans-serif" text-anchor="middle">Brand/OOH</text>

  <!-- Group 6: Supply Quality — 0 coverage -->
  <rect x="546" y="215" width="60" height="10" fill="#e11d48" fill-opacity="0.3" rx="2"/>
  <text x="576" y="223" fill="#e11d48" font-size="8" font-family="sans-serif" text-anchor="middle">⚠ No Coverage</text>
  <text x="576" y="242" fill="#94a3b8" font-size="9" font-family="sans-serif" text-anchor="middle">Supply Quality</text>

  <!-- Legend -->
  <rect x="80" y="260" width="10" height="10" fill="#2563eb"/>
  <text x="94" y="269" fill="#e2e8f0" font-size="9" font-family="sans-serif">OpenPanel</text>
  <rect x="165" y="260" width="10" height="10" fill="#f97316"/>
  <text x="179" y="269" fill="#e2e8f0" font-size="9" font-family="sans-serif">GA4</text>
  <rect x="210" y="260" width="10" height="10" fill="#16a34a"/>
  <text x="224" y="269" fill="#e2e8f0" font-size="9" font-family="sans-serif">Search Console</text>
  <rect x="320" y="260" width="10" height="10" fill="#0891b2"/>
  <text x="334" y="269" fill="#e2e8f0" font-size="9" font-family="sans-serif">Payment Gateway</text>
  <rect x="440" y="260" width="10" height="10" fill="#64748b"/>
  <text x="454" y="269" fill="#e2e8f0" font-size="9" font-family="sans-serif">Internal DB</text>
</svg>