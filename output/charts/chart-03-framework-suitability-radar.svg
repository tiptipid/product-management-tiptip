<?xml version="1.0" encoding="UTF-8"?>
<svg width="520" height="420" viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="520" height="420" fill="#0f172a"/>
  <!-- Grid circles -->
  <g stroke="#1e293b" stroke-width="1" fill="none">
    <circle cx="260" cy="200" r="32"/>
    <circle cx="260" cy="200" r="64"/>
    <circle cx="260" cy="200" r="96"/>
    <circle cx="260" cy="200" r="128"/>
    <circle cx="260" cy="200" r="160"/>
  </g>
  <!-- Grid score labels -->
  <text x="262" y="197" fill="#475569" font-size="9" font-family="sans-serif">2</text>
  <text x="262" y="165" fill="#475569" font-size="9" font-family="sans-serif">4</text>
  <text x="262" y="133" fill="#475569" font-size="9" font-family="sans-serif">6</text>
  <text x="262" y="101" fill="#475569" font-size="9" font-family="sans-serif">8</text>
  <text x="262" y="69" fill="#475569" font-size="9" font-family="sans-serif">10</text>

  <!-- 5 axes: angles start at -90deg (top), then +72deg each -->
  <!-- angle_i = -pi/2 + i*(2*pi/5) in degrees: -90, -90+72=-18, -90+144=54, -90+216=126, -90+288=198 -->
  <!-- cos/sin values (degrees to radians): -->
  <!-- ax0: -90deg => cos=-90=-0,sin=-90=-1 => (0,-1) => endpoint (260,40) -->
  <!-- ax1: -18deg => cos=-18=0.951,sin=-18=-0.309 => endpoint (260+152.2,200-49.4)=(412.2,150.6) -->
  <!-- ax2: 54deg => cos=54=0.588,sin=54=0.809 => endpoint (260+94,200+129.4)=(354,329.4) -->
  <!-- ax3: 126deg => cos=126=-0.588,sin=126=0.809 => endpoint (260-94,200+129.4)=(166,329.4) -->
  <!-- ax4: 198deg => cos=198=-0.951,sin=198=-0.309 => endpoint (260-152.2,200-49.4)=(107.8,150.6) -->
  <line x1="260" y1="200" x2="260" y2="40" stroke="#334155" stroke-width="1"/>
  <line x1="260" y1="200" x2="412" y2="151" stroke="#334155" stroke-width="1"/>
  <line x1="260" y1="200" x2="354" y2="329" stroke="#334155" stroke-width="1"/>
  <line x1="260" y1="200" x2="166" y2="329" stroke="#334155" stroke-width="1"/>
  <line x1="260" y1="200" x2="108" y2="151" stroke="#334155" stroke-width="1"/>

  <!-- Axis labels at r=178 -->
  <!-- ax0 top: Early-Stage Fit -->
  <text x="260" y="20" fill="#94a3b8" font-size="10" font-family="sans-serif" text-anchor="middle">Early-Stage Fit</text>
  <!-- ax1 top-right: Low Data Requirements -->
  <text x="432" y="148" fill="#94a3b8" font-size="10" font-family="sans-serif" text-anchor="start">Low Data Req</text>
  <!-- ax2 bottom-right: Execution Speed -->
  <text x="364" y="356" fill="#94a3b8" font-size="10" font-family="sans-serif" text-anchor="middle">Exec Speed</text>
  <!-- ax3 bottom-left: Cold-Start Handling -->
  <text x="156" y="356" fill="#94a3b8" font-size="10" font-family="sans-serif" text-anchor="middle">Cold-Start</text>
  <!-- ax4 top-left: Bias Resistance -->
  <text x="88" y="148" fill="#94a3b8" font-size="10" font-family="sans-serif" text-anchor="end">Bias Resistance</text>

  <!-- Helper: for score s on axis i, r=160: -->
  <!-- x = 260 + (s/10)*160*cos(angle_i), y = 200 + (s/10)*160*sin(angle_i) -->
  <!-- cos/sin: ax0=(0,-1), ax1=(0.951,-0.309), ax2=(0.588,0.809), ax3=(-0.588,0.809), ax4=(-0.951,-0.309) -->

  <!-- WSJF [3,2,3,2,4] red dashed -->
  <!-- ax0:3=>(260,200+3/10*160*(-1))=(260,152), ax1:2=>(260+2/10*160*0.951,200+2/10*160*(-0.309))=(260+30.4,200-9.9)=(290.4,190.1) -->
  <!-- ax2:3=>(260+3/10*160*0.588,200+3/10*160*0.809)=(260+28.2,200+38.8)=(288.2,238.8) -->
  <!-- ax3:2=>(260+2/10*160*(-0.588),200+2/10*160*0.809)=(260-18.8,200+25.9)=(241.2,225.9) -->
  <!-- ax4:4=>(260+4/10*160*(-0.951),200+4/10*160*(-0.309))=(260-60.9,200-19.8)=(199.1,180.2) -->
  <polygon points="260,152 290.4,190.1 288.2,238.8 241.2,225.9 199.1,180.2"
    fill="none" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- MoSCoW [8,10,10,9,4] yellow dashed -->
  <!-- ax0:8=>(260,200-128)=(260,72), ax1:10=>(260+152,200-49.4)=(412,150.6), ax2:10=>(260+94.1,200+129.4)=(354.1,329.4) -->
  <!-- ax3:9=>(260+9/10*160*(-0.588),200+9/10*160*0.809)=(260-84.7,200+116.5)=(175.3,316.5) -->
  <!-- ax4:4=>(199.1,180.2) -->
  <polygon points="260,72 412,150.6 354.1,329.4 175.3,316.5 199.1,180.2"
    fill="none" stroke="#eab308" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Value/Effort [8,10,10,9,5] orange dashed -->
  <!-- ax0:8=>(260,72), ax1:10=>(412,150.6), ax2:10=>(354.1,329.4), ax3:9=>(175.3,316.5) -->
  <!-- ax4:5=>(260+5/10*160*(-0.951),200+5/10*160*(-0.309))=(260-76.1,200-24.7)=(183.9,175.3) -->
  <polygon points="260,72 412,150.6 354.1,329.4 175.3,316.5 183.9,175.3"
    fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- RICE [7,4,5,3,5] blue dashed -->
  <!-- ax0:7=>(260,200-112)=(260,88), ax1:4=>(260+4/10*160*0.951,200+4/10*160*(-0.309))=(260+60.9,200-19.8)=(320.9,180.2) -->
  <!-- ax2:5=>(260+5/10*160*0.588,200+5/10*160*0.809)=(260+47.1,200+64.7)=(307.1,264.7) -->
  <!-- ax3:3=>(260+3/10*160*(-0.588),200+3/10*160*0.809)=(260-28.2,200+38.8)=(231.8,238.8) -->
  <!-- ax4:5=>(183.9,175.3) -->
  <polygon points="260,88 320.9,180.2 307.1,264.7 231.8,238.8 183.9,175.3"
    fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Kano [8,7,7,7,6] teal filled -->
  <!-- ax0:8=>(260,72), ax1:7=>(260+7/10*160*0.951,200+7/10*160*(-0.309))=(260+106.4,200-34.6)=(366.4,165.4) -->
  <!-- ax2:7=>(260+7/10*160*0.588,200+7/10*160*0.809)=(260+65.9,200+90.6)=(325.9,290.6) -->
  <!-- ax3:7=>(260+7/10*160*(-0.588),200+7/10*160*0.809)=(260-65.9,200+90.6)=(194.1,290.6) -->
  <!-- ax4:6=>(260+6/10*160*(-0.951),200+6/10*160*(-0.309))=(260-91.3,200-29.7)=(168.7,170.3) -->
  <polygon points="260,72 366.4,165.4 325.9,290.6 194.1,290.6 168.7,170.3"
    fill="#0891b2" fill-opacity="0.2" stroke="#0891b2" stroke-width="2"/>

  <!-- ICE [9,9,9,8,7] green filled -->
  <!-- ax0:9=>(260,200-144)=(260,56), ax1:9=>(260+9/10*160*0.951,200+9/10*160*(-0.309))=(260+136.9,200-44.5)=(396.9,155.5) -->
  <!-- ax2:9=>(260+9/10*160*0.588,200+9/10*160*0.809)=(260+84.7,200+116.5)=(344.7,316.5) -->
  <!-- ax3:8=>(260+8/10*160*(-0.588),200+8/10*160*0.809)=(260-75.3,200+103.6)=(184.7,303.6) -->
  <!-- ax4:7=>(260+7/10*160*(-0.951),200+7/10*160*(-0.309))=(260-106.4,200-34.6)=(153.6,165.4) -->
  <polygon points="260,56 396.9,155.5 344.7,316.5 184.7,303.6 153.6,165.4"
    fill="#16a34a" fill-opacity="0.25" stroke="#16a34a" stroke-width="3"/>

  <!-- Legend -->
  <rect x="30" y="380" width="10" height="10" fill="#16a34a" fill-opacity="0.7"/>
  <text x="44" y="389" fill="#e2e8f0" font-size="10" font-family="sans-serif">ICE</text>
  <rect x="80" y="380" width="10" height="10" fill="#0891b2" fill-opacity="0.5"/>
  <text x="94" y="389" fill="#e2e8f0" font-size="10" font-family="sans-serif">Kano</text>
  <line x1="140" y1="385" x2="153" y2="385" stroke="#2563eb" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="157" y="389" fill="#e2e8f0" font-size="10" font-family="sans-serif">RICE</text>
  <line x1="200" y1="385" x2="213" y2="385" stroke="#eab308" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="217" y="389" fill="#e2e8f0" font-size="10" font-family="sans-serif">MoSCoW</text>
  <line x1="277" y1="385" x2="290" y2="385" stroke="#e11d48" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="294" y="389" fill="#e2e8f0" font-size="10" font-family="sans-serif">WSJF</text>
  <line x1="330" y1="385" x2="343" y2="385" stroke="#f97316" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="347" y="389" fill="#e2e8f0" font-size="10" font-family="sans-serif">Value/Effort</text>
</svg>