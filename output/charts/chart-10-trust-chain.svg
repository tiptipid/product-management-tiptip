<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="110" viewBox="0 0 700 110" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="110" fill="#0f172a"/>
  <!-- Node boxes: 5 nodes, each ~120px wide, spaced with arrows -->
  <!-- Node 1: Operator Vetting (Ops) - grey -->
  <rect x="10" y="35" width="110" height="40" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="65" y="52" fill="#cbd5e1" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="600">Operator Vetting</text>
  <text x="65" y="64" fill="#94a3b8" font-size="8" font-family="sans-serif" text-anchor="middle">(Ops)</text>
  <!-- Arrow -->
  <line x1="120" y1="55" x2="138" y2="55" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Node 2: Verified Badge (Eng) - teal -->
  <rect x="140" y="35" width="110" height="40" rx="6" fill="#0c2233" stroke="#0891b2" stroke-width="1.5"/>
  <text x="195" y="52" fill="#67e8f9" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="600">Verified Badge</text>
  <text x="195" y="64" fill="#0891b2" font-size="8" font-family="sans-serif" text-anchor="middle">(Eng · Suggested)</text>
  <!-- Arrow -->
  <line x1="250" y1="55" x2="268" y2="55" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Node 3: Cancel Policy Audit - grey -->
  <rect x="270" y="35" width="110" height="40" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="325" y="52" fill="#cbd5e1" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="600">Cancel Policy</text>
  <text x="325" y="64" fill="#94a3b8" font-size="8" font-family="sans-serif" text-anchor="middle">Audit (Ops)</text>
  <!-- Arrow -->
  <line x1="380" y1="55" x2="398" y2="55" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Node 4: Free Cancel Badge - purple outline -->
  <rect x="400" y="35" width="120" height="40" rx="6" fill="#1a0533" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="460" y="52" fill="#c4b5fd" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="600">Free Cancel Badge</text>
  <text x="460" y="64" fill="#7c3aed" font-size="8" font-family="sans-serif" text-anchor="middle">(Suggested)</text>
  <!-- Arrow -->
  <line x1="520" y1="55" x2="538" y2="55" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Node 5: Review Nationality - purple outline -->
  <rect x="540" y="35" width="140" height="40" rx="6" fill="#1a0533" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="610" y="52" fill="#c4b5fd" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="600">Review Nationality</text>
  <text x="610" y="64" fill="#7c3aed" font-size="8" font-family="sans-serif" text-anchor="middle">Display (Suggested)</text>
  <!-- Arrow marker def -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/>
    </marker>
    <marker id="arr-purple" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>
  <!-- Legend -->
  <rect x="10" y="88" width="8" height="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="22" y="96" fill="#94a3b8" font-size="8" font-family="sans-serif">Ops prerequisite</text>
  <rect x="120" y="88" width="8" height="8" fill="#0c2233" stroke="#0891b2" stroke-width="1.5"/>
  <text x="132" y="96" fill="#94a3b8" font-size="8" font-family="sans-serif">Eng task</text>
  <rect x="195" y="88" width="8" height="8" fill="#1a0533" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="207" y="96" fill="#94a3b8" font-size="8" font-family="sans-serif">Suggested initiative</text>
</svg>